<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — SloughApp</title>
  <link rel="stylesheet" href="assets/css/reset-password.css">
  <script src="https://cdn.jsdelivr.net/npm/appwrite@16/dist/iife/sdk.js"></script>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="https://slough.app/logo.png" alt="SloughApp" />
    </div>
    <h1>Reset your password</h1>
    <p class="subtitle">Enter a new password for your account</p>

    <div id="invalid-msg" class="msg error hidden">
      This reset link is invalid or has expired. Please request a new one.
    </div>

    <form id="reset-form">
      <label for="password">New password</label>
      <input type="password" id="password" placeholder="At least 8 characters" required minlength="8" />

      <label for="confirm">Confirm password</label>
      <input type="password" id="confirm" placeholder="Repeat new password" required minlength="8" />

      <button type="submit" id="submit-btn">Set new password</button>
    </form>

    <div id="msg" class="msg"></div>

    <div class="open-app hidden" id="app-link-wrap">
      On mobile? <a id="app-link" href="#">Open in app</a>
    </div>
  </div>

  <script>
    const APPWRITE_PROJECT_ID = '68801b5600199e70bc71'

    const { Client, Account } = Appwrite
    const client = new Client()
      .setEndpoint('https://login.slough.app/v1')
      .setProject(APPWRITE_PROJECT_ID)
    const account = new Account(client)

    const params = new URLSearchParams(window.location.search)
    const userId = params.get('userId')
    const secret = params.get('secret')

    const form = document.getElementById('reset-form')
    const submitBtn = document.getElementById('submit-btn')
    const msgEl = document.getElementById('msg')
    const invalidMsg = document.getElementById('invalid-msg')
    const appLinkWrap = document.getElementById('app-link-wrap')
    const appLink = document.getElementById('app-link')

    if (!userId || !secret) {
      invalidMsg.classList.remove('hidden')
      form.classList.add('hidden')
    }

    const isMobile = /android|iphone|ipad|ipod/i.test(navigator.userAgent)
    if (isMobile && userId && secret) {
      appLink.href = `sloughapp://reset-password?userId=${encodeURIComponent(userId)}&secret=${encodeURIComponent(secret)}`
      appLinkWrap.classList.remove('hidden')
    }

    function showMsg(text, type) {
      msgEl.textContent = text
      msgEl.className = `msg ${type}`
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault()

      const password = document.getElementById('password').value
      const confirm = document.getElementById('confirm').value

      if (password !== confirm) {
        showMsg('Passwords do not match.', 'error')
        return
      }

      submitBtn.disabled = true
      submitBtn.textContent = 'Updating…'
      msgEl.className = 'msg'

      try {
        await account.updateRecovery(userId, secret, password)
        showMsg('Password updated! You can now log in with your new password.', 'success')
        form.classList.add('hidden')
      } catch (err) {
        showMsg(err.message || 'Something went wrong.', 'error')
        submitBtn.disabled = false
        submitBtn.textContent = 'Set new password'
      }
    })
  </script>
</body>
</html>
