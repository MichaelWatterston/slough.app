<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — SloughApp</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.10);
      padding: 36px 32px;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      color: #e8563a;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #111;
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #444;
      margin-bottom: 6px;
    }

    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="password"]:focus {
      border-color: #e8563a;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #e8563a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #d14a30; }
    button:disabled { background: #ccc; cursor: not-allowed; }

    .msg {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }

    .msg.error { background: #fdecea; color: #c0392b; display: block; }
    .msg.success { background: #eafaf1; color: #1e8449; display: block; }

    .open-app {
      margin-top: 20px;
      text-align: center;
      font-size: 14px;
      color: #666;
    }

    .open-app a {
      color: #e8563a;
      font-weight: 600;
      text-decoration: none;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">SloughApp</div>
    <h1>Reset your password</h1>

    <div id="invalid-msg" class="msg error hidden">
      This reset link is invalid or has expired. Please request a new one.
    </div>

    <form id="reset-form">
      <label for="password">New password</label>
      <input type="password" id="password" placeholder="At least 8 characters" required minlength="8" />

      <label for="confirm">Confirm password</label>
      <input type="password" id="confirm" placeholder="Repeat new password" required minlength="8" />

      <button type="submit" id="submit-btn">Set new password</button>
    </form>

    <div id="msg" class="msg"></div>

    <div class="open-app hidden" id="app-link-wrap">
      On mobile? <a id="app-link" href="#">Open in app</a>
    </div>
  </div>

  <script>
    const APPWRITE_ENDPOINT = 'https://cloud.appwrite.io/v1'
    const APPWRITE_PROJECT_ID = '67627ec10023b69b9fc8'

    const params = new URLSearchParams(window.location.search)
    const userId = params.get('userId')
    const secret = params.get('secret')

    const form = document.getElementById('reset-form')
    const submitBtn = document.getElementById('submit-btn')
    const msgEl = document.getElementById('msg')
    const invalidMsg = document.getElementById('invalid-msg')
    const appLinkWrap = document.getElementById('app-link-wrap')
    const appLink = document.getElementById('app-link')

    if (!userId || !secret) {
      invalidMsg.classList.remove('hidden')
      form.classList.add('hidden')
    }

    // Show "Open in app" on mobile
    const isMobile = /android|iphone|ipad|ipod/i.test(navigator.userAgent)
    if (isMobile && userId && secret) {
      appLink.href = `sloughapp://reset-password?userId=${encodeURIComponent(userId)}&secret=${encodeURIComponent(secret)}`
      appLinkWrap.classList.remove('hidden')
    }

    function showMsg(text, type) {
      msgEl.textContent = text
      msgEl.className = `msg ${type}`
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault()

      const password = document.getElementById('password').value
      const confirm = document.getElementById('confirm').value

      if (password !== confirm) {
        showMsg('Passwords do not match.', 'error')
        return
      }

      submitBtn.disabled = true
      submitBtn.textContent = 'Updating…'
      msgEl.className = 'msg'

      try {
        const res = await fetch(`${APPWRITE_ENDPOINT}/account/recovery`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'X-Appwrite-Project': APPWRITE_PROJECT_ID,
          },
          body: JSON.stringify({ userId, secret, password }),
        })

        const data = await res.json()

        if (!res.ok) {
          throw new Error(data.message || 'Something went wrong.')
        }

        showMsg('Password updated! You can now log in with your new password.', 'success')
        form.classList.add('hidden')
      } catch (err) {
        showMsg(err.message, 'error')
        submitBtn.disabled = false
        submitBtn.textContent = 'Set new password'
      }
    })
  </script>
</body>
</html>
