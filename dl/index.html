<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#ffffff">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <title>Opening Slough App…</title>
  <style>
    html, body { margin: 0; height: 100%; background: #fff; color: #0a0a14; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .wrap { min-height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; }
    img { width: 56px; height: 56px; border-radius: 12px; margin-bottom: 16px; }
    h1 { font-size: 1.1rem; margin: 0 0 8px; }
    p { color: #6b7280; font-size: 0.9rem; margin: 0; }
    a { color: #2a1ed8; }
  </style>
  <script>
    (function () {
      var IOS_URL = 'https://apps.apple.com/gb/app/id6760595588';
      var ANDROID_URL = 'https://play.google.com/store/apps/details?id=com.sloughapp.app';
      var FALLBACK_URL = 'https://slough.app/get-slough-app/';
      var ua = navigator.userAgent || '';
      var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
      var isAndroid = /Android/i.test(ua);
      var target = isIOS ? IOS_URL : isAndroid ? ANDROID_URL : FALLBACK_URL;
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <div class="wrap">
    <img src="/logo.png" alt="">
    <h1>Opening Slough App…</h1>
    <p>If you aren't redirected, <a href="/get-slough-app/">tap here</a>.</p>
  </div>
</body>
</html>
